<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="mySked provides live public transport schedules, operator route displays, advisories, and passenger information dashboards." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#6A2C91" />
  <link rel="icon" type="image/png" href="/broadimagi_icon.png" />
  <link rel="shortcut icon" href="/broadimagi_icon.png" />
  <link rel="canonical" href="https://mysked.broadimagi.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="mySked" />
  <meta property="og:title" content="mySked Live Transport Schedules" />
  <meta property="og:description" content="Live route schedules, transport advisories, and passenger information displays for supported operators." />
  <meta property="og:url" content="https://mysked.broadimagi.com/" />
  <meta name="twitter:card" content="summary" />
  <title>mySked Live Transport Schedules</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "mySked",
      "url": "https://mysked.broadimagi.com/",
      "description": "Live public transport schedules, operator route displays, advisories, and passenger information dashboards."
    }
  </script>
</head>
<body>
  <div id="loadingScreen">
    <div class="loader"></div>
    <h1>mySked</h1>
    <p>Syncing Live Variable Workspace Pipelines...</p>
  </div>

  <div id="app" class="hidden">
    <header id="header">
      <div class="company">
        <img id="companyLogo" class="hidden" alt="" />
        <div id="companyLogoFallback" class="logo-fallback">MS</div>
        <div>
          <div id="companyName">mySked</div>
          <div id="companyTagline">Passenger Information System</div>
        </div>
      </div>
      <div class="view-controls">
        <button id="toggleDashboardBtn" class="nav-btn active" type="button">Dashboard</button>
        <button id="toggleSelectionBtn" class="nav-btn" type="button">Routes</button>
      </div>
      <div class="header-right">
        <button id="themeToggleBtn" class="theme-btn" type="button"><span class="sun-icon">Light</span><span class="moon-icon">Dark</span></button>
        <div class="clock-display">
          <div id="currentTime">--:--:--</div>
          <div id="currentDate">Loading...</div>
        </div>
      </div>
    </header>

    <div id="announcementBar">
      <div class="ticker-title">Advisory</div>
      <div class="ticker-wrap"><div id="ticker"></div></div>
    </div>

    <main class="main-viewport-body">
      <div id="dashboardView" class="view-panel"></div>
      <div id="selectionView" class="view-panel hidden">
        <div class="selection-grid-layout">
          <div class="sidebar-panel-wrapper">
            <div class="routes-card-box">
              <div class="section-head-title">Active Routes</div>
              <div id="routeContainer" class="scroll-chips-track"></div>
            </div>
            <div class="routes-card-box">
              <div class="section-head-title">Non Active Routes</div>
              <div id="inactiveRoutes" class="scroll-chips-track"></div>
            </div>
          </div>
          <div class="schedule-workspace-board">
            <div class="workspace-header-hero">
              <div class="workspace-meta-details">
                <h3>Tracked Operations Line</h3>
                <h2 id="selectedRoute">Select a route segment...</h2>
              </div>
              <div class="workspace-header-actions">
                <div id="nextDepartureCard">
                  <div class="label">Next Departure</div>
                  <div id="nextDepartureTime">--:--</div>
                  <div id="nextDepartureStatus">-</div>
                </div>
              </div>
            </div>
            <div class="timeline-title"></div>
            <div class="scrollable-content">
              <div id="scheduleContainer" class="schedule-list"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer-bar-container"></footer>
  </div>

  <div id="modalOverlay" class="modalOverlay hidden">
    <div class="modalBox">
      <div class="modalHeader">
        <h2>Schedule Details</h2>
        <button id="closeModal" type="button">x</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
